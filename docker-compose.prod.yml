# Production stack для VPS (nginx + Let's Encrypt + приложение).
#
# 1) cp deploy/env.prod.example .env.prod && заполните
# 2) bash deploy/scripts/init-letsencrypt.sh   # первый SSL
# 3) docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Обновление: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

name: chesscast

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PWD}
    command: >
      redis-server
      --requirepass ${REDIS_PWD}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "true"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsSk -u elastic:$${ELASTIC_PASSWORD} https://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 25
      start_period: 90s
    networks: [internal]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "5000"
      USE_HTTPS: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PWD: ${REDIS_PWD}
      ELASTICSEARCH_NODE: https://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
      ELASTICSEARCH_TLS_INSECURE: "true"
      FRONTEND_URL: https://${DOMAIN}
      YOOKASSA_RETURN_URL: https://${DOMAIN}/dashboard/profile?payment=success
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP}
      CHESS_RECOGNITION_DIR: /chess-recognition
      PYTHON_BIN: python3
    volumes:
      - uploads_data:/app/uploads
      - ./chess-recognition:/chess-recognition:ro
      - chessboard_mappings:/app/chessboard_mappings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "${MEDIASOUP_UDP_PORT_MIN:-40000}-${MEDIASOUP_UDP_PORT_MAX:-40100}:40000-40100/udp"
    networks: [internal]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NEST_API_URL: https://${DOMAIN}/api
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      CERT_NAME: ${CERT_NAME}
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks: [internal, edge]

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    networks: [edge]

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  chessboard_mappings:
  uploads_data:
  certbot_www:
  certbot_certs:
